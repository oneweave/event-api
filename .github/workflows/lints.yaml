name: Run Spectral on Pull Requests

on:
    - pull_request

permissions:
    checks: write

jobs:
    build:
        name: Run Spectral
        runs-on: ubuntu-latest
        steps:
            # Check out the repository
            - uses: actions/checkout@v6

            # Run Spectral
            - uses: stoplightio/spectral-action@v0.8.13
              with:
                  file_glob: "asyncapi.yaml"
