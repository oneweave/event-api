asyncapi: 3.1.0
info:
  title: OneWeave Generic Event API Components
  version: 0.0.1
  description:
    Event contract for OneWeave artifact-builder release requests, build results,
    broker updates, controller updates, and tenant registration lifecycle events.

components:
  messages:
    # --- Release Domain ---
    ArtifactReleaseRequestedV1:
      name: ArtifactReleaseRequestedV1
      title: artifact.release.requested.v1
      summary: Release creation request is ready for artifact builder processing.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactReleaseRequestedCloudEvent"
    ArtifactReleaseValidatedV1:
      name: ArtifactReleaseValidatedV1
      title: artifact.release.validated.v1
      summary: Release has passed validation and remains build eligible.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactReleaseValidatedCloudEvent"
    ArtifactReleaseRejectedV1:
      name: ArtifactReleaseRejectedV1
      title: artifact.release.rejected.v1
      summary: Release creation request was rejected.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactReleaseRejectedCloudEvent"
    ArtifactReleasePublishedV1:
      name: ArtifactReleasePublishedV1
      title: artifact.release.published.v1
      summary: Release has been published.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactReleasePublishedCloudEvent"
    ArtifactReleaseDeprecatedV1:
      name: ArtifactReleaseDeprecatedV1
      title: artifact.release.deprecated.v1
      summary: Release has been deprecated.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactReleaseDeprecatedCloudEvent"
    ArtifactReleaseRetiredV1:
      name: ArtifactReleaseRetiredV1
      title: artifact.release.retired.v1
      summary: Release has been retired.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactReleaseRetiredCloudEvent"

    # --- Build Domain ---
    ArtifactBuildRequestedV1:
      name: ArtifactBuildRequestedV1
      title: artifact.build.requested.v1
      summary: Build request has been submitted.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuildRequestedCloudEvent"
    ArtifactBuildStartedV1:
      name: ArtifactBuildStartedV1
      title: artifact.build.started.v1
      summary: Build submission began after source verification.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuildStartedCloudEvent"
    ArtifactBuildSucceededV1:
      name: ArtifactBuildSucceededV1
      title: artifact.build.succeeded.v1
      summary: Build chain produced a usable artifact.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuildSucceededCloudEvent"
    ArtifactBuildFailedV1:
      name: ArtifactBuildFailedV1
      title: artifact.build.failed.v1
      summary: Build request failed during verification or build execution.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuildFailedCloudEvent"

    # --- Broker Domain ---
    BrokerUpdateRequestedV1:
      name: BrokerUpdateRequestedV1
      title: broker.update.requested.v1
      summary: Broker update request has been submitted.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/BrokerUpdateRequestedCloudEvent"
    BrokerUpdateSucceededV1:
      name: BrokerUpdateSucceededV1
      title: broker.update.succeeded.v1
      summary: Broker update succeeded.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/BrokerUpdateSucceededCloudEvent"
    BrokerUpdateFailedV1:
      name: BrokerUpdateFailedV1
      title: broker.update.failed.v1
      summary: Broker update failed.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/BrokerUpdateFailedCloudEvent"
    BrokerUpdateRejectedV1:
      name: BrokerUpdateRejectedV1
      title: broker.update.rejected.v1
      summary: Broker update was rejected.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/BrokerUpdateRejectedCloudEvent"

    # --- Controller Domain ---
    ControllerUpdateRequestedV1:
      name: ControllerUpdateRequestedV1
      title: controller.update.requested.v1
      summary: Controller update request has been submitted.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ControllerUpdateRequestedCloudEvent"
    ControllerUpdateSucceededV1:
      name: ControllerUpdateSucceededV1
      title: controller.update.succeeded.v1
      summary: Controller update succeeded.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ControllerUpdateSucceededCloudEvent"
    ControllerUpdateFailedV1:
      name: ControllerUpdateFailedV1
      title: controller.update.failed.v1
      summary: Controller update failed.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ControllerUpdateFailedCloudEvent"
    ControllerUpdateRejectedV1:
      name: ControllerUpdateRejectedV1
      title: controller.update.rejected.v1
      summary: Controller update was rejected.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ControllerUpdateRejectedCloudEvent"

    # --- Tenant Domain ---
    TenantRegisteredV1:
      name: TenantRegisteredV1
      title: tenant.registered.v1
      summary: A new tenant has been registered in the platform.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/TenantRegisteredCloudEvent"
    TenantUpdatedV1:
      name: TenantUpdatedV1
      title: tenant.updated.v1
      summary: A tenant has been updated on the platform.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/TenantUpdatedCloudEvent"

    # --- Liveness Domain ---
    ArtifactBuilderLivenessRequested:
      name: ArtifactBuilderLivenessRequested
      title: artifact.builder.liveness.requested
      summary: Liveness check requested for artifact-builder.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuilderLivenessRequestedCloudEvent"
    ArtifactBuilderLivenessPassed:
      name: ArtifactBuilderLivenessPassed
      title: artifact.builder.liveness.passed
      summary: Liveness check passed for artifact-builder.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuilderLivenessPassedCloudEvent"
    ArtifactBuilderLivenessFailed:
      name: ArtifactBuilderLivenessFailed
      title: artifact.builder.liveness.failed
      summary: Liveness check failed for artifact-builder.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactBuilderLivenessFailedCloudEvent"

    ArtifactRegistryLivenessRequested:
      name: ArtifactRegistryLivenessRequested
      title: artifact.registry.liveness.requested
      summary: Liveness check requested for artifact-registry.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactRegistryLivenessRequestedCloudEvent"
    ArtifactRegistryLivenessPassed:
      name: ArtifactRegistryLivenessPassed
      title: artifact.registry.liveness.passed
      summary: Liveness check passed for artifact-registry.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactRegistryLivenessPassedCloudEvent"
    ArtifactRegistryLivenessFailed:
      name: ArtifactRegistryLivenessFailed
      title: artifact.registry.liveness.failed
      summary: Liveness check failed for artifact-registry.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ArtifactRegistryLivenessFailedCloudEvent"

    ServiceBrokerLivenessRequested:
      name: ServiceBrokerLivenessRequested
      title: service.broker.liveness.requested
      summary: Liveness check requested for service-broker.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceBrokerLivenessRequestedCloudEvent"
    ServiceBrokerLivenessPassed:
      name: ServiceBrokerLivenessPassed
      title: service.broker.liveness.passed
      summary: Liveness check passed for service-broker.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceBrokerLivenessPassedCloudEvent"
    ServiceBrokerLivenessFailed:
      name: ServiceBrokerLivenessFailed
      title: service.broker.liveness.failed
      summary: Liveness check failed for service-broker.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceBrokerLivenessFailedCloudEvent"

    ServiceControllerLivenessRequested:
      name: ServiceControllerLivenessRequested
      title: service.controller.liveness.requested
      summary: Liveness check requested for service-controller.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceControllerLivenessRequestedCloudEvent"
    ServiceControllerLivenessPassed:
      name: ServiceControllerLivenessPassed
      title: service.controller.liveness.passed
      summary: Liveness check passed for service-controller.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceControllerLivenessPassedCloudEvent"
    ServiceControllerLivenessFailed:
      name: ServiceControllerLivenessFailed
      title: service.controller.liveness.failed
      summary: Liveness check failed for service-controller.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceControllerLivenessFailedCloudEvent"

    ServiceRegistryLivenessRequested:
      name: ServiceRegistryLivenessRequested
      title: service.registry.liveness.requested
      summary: Liveness check requested for service-registry.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceRegistryLivenessRequestedCloudEvent"
    ServiceRegistryLivenessPassed:
      name: ServiceRegistryLivenessPassed
      title: service.registry.liveness.passed
      summary: Liveness check passed for service-registry.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceRegistryLivenessPassedCloudEvent"
    ServiceRegistryLivenessFailed:
      name: ServiceRegistryLivenessFailed
      title: service.registry.liveness.failed
      summary: Liveness check failed for service-registry.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/ServiceRegistryLivenessFailedCloudEvent"

    TenantManagementLivenessRequested:
      name: TenantManagementLivenessRequested
      title: tenant.management.liveness.requested
      summary: Liveness check requested for tenant-management.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/TenantManagementLivenessRequestedCloudEvent"
    TenantManagementLivenessPassed:
      name: TenantManagementLivenessPassed
      title: tenant.management.liveness.passed
      summary: Liveness check passed for tenant-management.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/TenantManagementLivenessPassedCloudEvent"
    TenantManagementLivenessFailed:
      name: TenantManagementLivenessFailed
      title: tenant.management.liveness.failed
      summary: Liveness check failed for tenant-management.
      contentType: application/cloudevents+json; version=1.0
      payload:
        $ref: "#/components/schemas/TenantManagementLivenessFailedCloudEvent"

  schemas:
    # --- Base event-id Identifier ---
    EventID:
      type: string
      pattern: "^[a-z]{1,5}_[0-9a-hjkmnpqrstvwxyz]{26}$"
      description: Prefixed UUIDv7 encoded in lowercase Crockford Base32.

    # --- CloudEvent Envelopes ---
    ArtifactReleaseRequestedCloudEvent:
      type: object
      required: &CloudEventRequired
        - id
        - source
        - specversion
        - type
        - subject
        - time
        - datacontenttype
        - dataschema
        - correlationid
        - causationid
        - data
      properties: &CloudEventProperties
        id:
          $ref: "#/components/schemas/EventID"
        source:
          type: string
        specversion:
          type: string
          enum: ["1.0"]
        type:
          type: string
          enum: [artifact.release.requested.v1]
        subject:
          type: string
        time:
          type: string
          format: date-time
        datacontenttype:
          type: string
          enum: [application/json]
        dataschema:
          type: string
        correlationid:
          $ref: "#/components/schemas/EventID"
        causationid:
          $ref: "#/components/schemas/EventID"
        data:
          $ref: "#/components/schemas/ArtifactReleaseRequestedData"

    ArtifactReleaseValidatedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.release.validated.v1]
        data:
          $ref: "#/components/schemas/ArtifactReleaseValidatedData"

    ArtifactReleaseRejectedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.release.rejected.v1]
        data:
          $ref: "#/components/schemas/ArtifactReleaseRejectedData"

    ArtifactReleasePublishedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.release.published.v1]
        data:
          $ref: "#/components/schemas/ArtifactReleasePublishedData"

    ArtifactReleaseDeprecatedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.release.deprecated.v1]
        data:
          $ref: "#/components/schemas/ArtifactReleaseDeprecatedData"

    ArtifactReleaseRetiredCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.release.retired.v1]
        data:
          $ref: "#/components/schemas/ArtifactReleaseBaseData"

    ArtifactBuildRequestedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.build.requested.v1]
        data:
          $ref: "#/components/schemas/ArtifactBuildRequestedData"

    ArtifactBuildStartedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.build.started.v1]
        data:
          $ref: "#/components/schemas/ArtifactBuildStartedData"

    ArtifactBuildSucceededCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.build.succeeded.v1]
        data:
          $ref: "#/components/schemas/ArtifactBuildSucceededData"

    ArtifactBuildFailedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [artifact.build.failed.v1]
        data:
          $ref: "#/components/schemas/ArtifactBuildFailedData"

    BrokerUpdateRequestedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [broker.update.requested.v1]
        data:
          $ref: "#/components/schemas/BrokerUpdateRequestedData"

    BrokerUpdateSucceededCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [broker.update.succeeded.v1]
        data:
          $ref: "#/components/schemas/BrokerUpdateSucceededData"

    BrokerUpdateFailedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [broker.update.failed.v1]
        data:
          $ref: "#/components/schemas/BrokerUpdateFailedData"

    BrokerUpdateRejectedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [broker.update.rejected.v1]
        data:
          $ref: "#/components/schemas/BrokerUpdateRejectedData"

    ControllerUpdateRequestedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [controller.update.requested.v1]
        data:
          $ref: "#/components/schemas/ControllerUpdateRequestedData"

    ControllerUpdateSucceededCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [controller.update.succeeded.v1]
        data:
          $ref: "#/components/schemas/ControllerUpdateSucceededData"

    ControllerUpdateFailedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [controller.update.failed.v1]
        data:
          $ref: "#/components/schemas/ControllerUpdateFailedData"

    ControllerUpdateRejectedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [controller.update.rejected.v1]
        data:
          $ref: "#/components/schemas/ControllerUpdateRejectedData"

    TenantRegisteredCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [tenant.registered.v1]
        data:
          $ref: "#/components/schemas/TenantRegisteredData"

    TenantUpdatedCloudEvent:
      type: object
      required: *CloudEventRequired
      properties:
        <<: *CloudEventProperties
        type:
          type: string
          enum: [tenant.updated.v1]
        data:
          $ref: "#/components/schemas/TenantBaseData"



    # --- Data Payloads ---

    ArtifactReleaseBaseData:
      type: object
      required:
        - releaseId
        - artifactId
      properties:
        releaseId:
          $ref: "#/components/schemas/EventID"
        artifactId:
          $ref: "#/components/schemas/EventID"

    ArtifactReleaseValidatedData:
      type: object
      required:
        - releaseId
        - artifactId
        - manifest
      properties:
        releaseId:
          $ref: "#/components/schemas/EventID"
        artifactId:
          $ref: "#/components/schemas/EventID"
        manifest:
          $ref: "#/components/schemas/PluginManifest"

    ArtifactReleaseRequestedData:
      type: object
      required:
        - releaseId
        - artifactId
        - releaseSource
        - releaseTarget
      properties:
        releaseId:
          $ref: "#/components/schemas/EventID"
        artifactId:
          $ref: "#/components/schemas/EventID"
        releaseSource:
          $ref: "#/components/schemas/ReleaseSource"
        releaseTarget:
          $ref: "#/components/schemas/ReleaseTarget"

    ArtifactReleaseRejectedData:
      type: object
      required:
        - releaseId
        - artifactId
        - reason
      properties:
        releaseId:
          $ref: "#/components/schemas/EventID"
        artifactId:
          $ref: "#/components/schemas/EventID"
        reason:
          type: string

    ArtifactReleasePublishedData:
      type: object
      required:
        - releaseId
        - artifactId
        - releaseTarget
        - manifest
      properties:
        releaseId:
          $ref: "#/components/schemas/EventID"
        artifactId:
          $ref: "#/components/schemas/EventID"
        releaseTarget:
          $ref: "#/components/schemas/ReleaseTarget"
        manifest:
          $ref: "#/components/schemas/PluginManifest"

    ArtifactReleaseDeprecatedData:
      type: object
      required:
        - releaseId
        - artifactId
        - reason
      properties:
        releaseId:
          $ref: "#/components/schemas/EventID"
        artifactId:
          $ref: "#/components/schemas/EventID"
        reason:
          type: string

    ReleaseSource:
      type: object
      required:
        - repository
        - sourceRevision
      properties:
        repository:
          $ref: "#/components/schemas/ReleaseSourceRepository"
        sourceRevisionRef:
          type: string
        sourceRevision:
          type: string
        manifestFilePath:
          type: string
        dockerContextPath:
          type: string
          nullable: true
        dockerfilePath:
          type: string
          nullable: true
        buildArgs:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseSourceBuildArg"

    ReleaseSourceRepository:
      type: object
      required:
        - kind
        - protocol
        - url
      properties:
        kind:
          type: string
          enum: [git]
        protocol:
          type: string
          enum: [https, ssh, git]
        url:
          type: string
        credentialRef:
          type: string
          nullable: true

    ReleaseSourceBuildArg:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        value:
          type: string
          nullable: true

    ReleaseTarget:
      type: object
      required:
        - publicVersion
        - platform
        - imagePushTarget
      properties:
        publicVersion:
          type: string
        platform:
          type: string
          enum: ["linux/amd64"]
        imagePushTarget:
          $ref: "#/components/schemas/ReleaseImagePushTarget"

    ImageTarget:
      type: object
      required:
        - name
        - kind
        - protocol
        - baseUrl
        - namespace
        - tags
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [oci-registry]
        protocol:
          type: string
          enum: [oci, https]
        baseUrl:
          type: string
        namespace:
          type: string
        tags:
          type: array
          items:
            type: string
        credentialRef:
          type: string
          nullable: true

    ReleaseImagePushTarget:
      $ref: "#/components/schemas/ImageTarget"

    ReleaseImagePullTarget:
      $ref: "#/components/schemas/ImageTarget"

    ArtifactBuildBaseData:
      type: object
      required:
        - buildId
        - releaseId
      properties:
        buildId:
          $ref: "#/components/schemas/EventID"
        releaseId:
          $ref: "#/components/schemas/EventID"
        sourceInfo:
          $ref: "#/components/schemas/BuildSourceInfo"

    BuildSourceInfo:
      type: object
      required:
        - revision
        - commitish
      properties:
        revision:
          type: string
        commitish:
          type: string

    ArtifactBuildRequestedData:
      type: object
      required:
        - buildId
        - releaseId
        - releaseSource
        - releaseTarget
      properties:
        buildId:
          $ref: "#/components/schemas/EventID"
        releaseId:
          $ref: "#/components/schemas/EventID"
        sourceInfo:
          $ref: "#/components/schemas/BuildSourceInfo"
        releaseSource:
          $ref: "#/components/schemas/ReleaseSource"
        releaseTarget:
          $ref: "#/components/schemas/ReleaseTarget"

    ArtifactBuildStartedData:
      $ref: "#/components/schemas/ArtifactBuildBaseData"

    ArtifactBuildSucceededData:
      type: object
      required:
        - buildId
        - releaseId
        - imagePullTargets
        - manifest
      properties:
        buildId:
          $ref: "#/components/schemas/EventID"
        releaseId:
          $ref: "#/components/schemas/EventID"
        sourceInfo:
          $ref: "#/components/schemas/BuildSourceInfo"
        imagePullTargets:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseImagePullTarget"
        manifest:
          $ref: "#/components/schemas/PluginManifest"

    ArtifactBuildFailedData:
      type: object
      required:
        - buildId
        - releaseId
        - failureCode
      properties:
        buildId:
          $ref: "#/components/schemas/EventID"
        releaseId:
          $ref: "#/components/schemas/EventID"
        sourceInfo:
          $ref: "#/components/schemas/BuildSourceInfo"
        failureCode:
          type: string
        failureMessage:
          type: string
          nullable: true

    BrokerUpdateBaseData:
      type: object
      required:
        - brokerId
        - serviceId
        - serviceVersionHash
      properties:
        brokerId:
          $ref: "#/components/schemas/EventID"
        serviceId:
          $ref: "#/components/schemas/EventID"
        serviceVersionHash:
          type: string

    BrokerUpdateRequestedData:
      type: object
      required:
        - brokerId
        - serviceId
        - serviceVersionHash
        - manifest
      properties:
        brokerId:
          $ref: "#/components/schemas/EventID"
        serviceId:
          $ref: "#/components/schemas/EventID"
        serviceVersionHash:
          type: string
        manifest:
          $ref: "#/components/schemas/PluginManifest"

    BrokerUpdateSucceededData:
      type: object
      required:
        - brokerId
        - serviceId
        - serviceVersionHash
      properties:
        brokerId:
          $ref: "#/components/schemas/EventID"
        serviceId:
          $ref: "#/components/schemas/EventID"
        serviceVersionHash:
          type: string
        manifest:
          $ref: "#/components/schemas/PluginManifest"

    BrokerUpdateFailedData:
      type: object
      required:
        - brokerId
        - serviceId
        - serviceVersionHash
        - failureCode
      properties:
        brokerId:
          $ref: "#/components/schemas/EventID"
        serviceId:
