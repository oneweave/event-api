          nullable: true
        owner:
          type: string
          nullable: true
        annotations:
          type: object
          additionalProperties:
            type: string

    PluginManifestSpec:
      type: object
      required:
        - compatibility
        - interfaces
        - dependencies
        - permissions
        - configuration
        - imagePullTarget
        - observability
      properties:
        compatibility:
          $ref: "#/components/schemas/PluginManifestCompatibility"
        interfaces:
