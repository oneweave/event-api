      properties:
        rest:
          $ref: "#/components/schemas/PluginManifestREST"
        events:
          $ref: "#/components/schemas/PluginManifestEvents"

    PluginManifestREST:
      type: object
      properties:
        public:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestRestEndpoint"
        internal:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestRestEndpoint"

    PluginManifestRestEndpoint:
      type: object
      required:
        - path
        - methods
      properties:
        path:
          type: string
        methods:
          type: array
          items:
            type: string
        allowAnonymous:
          type: boolean
          nullable: true

    PluginManifestEvents:
      type: object
      properties:
        publishes:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestEventDescriptor"
        consumes:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestEventDescriptor"

    PluginManifestEventDescriptor:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        requiresCapabilities:
          type: array
          items:
            type: string
        required:
          type: boolean
          nullable: true

    PluginManifestDependencies:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestDependency"

    PluginManifestDependency:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        version:
          type: string
          nullable: true
        required:
          type: boolean
          nullable: true

    PluginManifestPermissions:
      type: object
      required:
        - dataAccess
      properties:
        dataAccess:
          $ref: "#/components/schemas/PluginManifestPermissionDataAccess"

    PluginManifestPermissionDataAccess:
      type: object
      properties:
        owns:
          type: array
          items:
            type: string
        dependsOn:
          type: array
          items:
            type: string

    PluginManifestConfiguration:
      type: object
      required:
        - health
        - replicas
        - resources
      properties:
        health:
          $ref: "#/components/schemas/PluginManifestHealthProbes"
        replicas:
          $ref: "#/components/schemas/ReplicaConfiguration"
        resources:
          $ref: "#/components/schemas/PluginManifestResources"
        environmentVariables:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestEnvironmentVariable"
        files:
          type: array
          items:
            $ref: "#/components/schemas/PluginManifestConfigFile"

    PluginManifestHealthProbes:
      type: object
      required:
